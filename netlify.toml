[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20"

[functions]
directory = "netlify/functions"

[[redirects]]
from = "/api/ai/image/generate"
to = "/.netlify/functions/image/generate"
status = 200
force = true

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/api/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
