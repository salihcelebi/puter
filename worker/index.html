<!--
█████████████████████████████████████████████
1) BU DOSYA, PUTER FİYAT TAKİP ARACININ TARAYICIDA GÖRÜLEN ANA HTML ARAYÜZÜDÜR.
2) SAYFA, SAĞLAYICI VE SERVİS TÜRÜNE GÖRE FİYAT KAYITLARINI FİLTRELEMEK İÇİN FORM ELEMANLARI İÇERİR.
3) providerFilter VE serviceFilter SELECT ELEMANLARI, DİNAMİK FİLTRELEME İÇİN app.js TARAFINDAN DOLDURULUR.
4) searchInput, TABLODAN SERBEST METİNLE ARAMA YAPMAK İÇİN KULLANILIR.
5) reloadBtn, VERİYİ YENİDEN SUNUCUDAN ÇEKMEYİ TETİKLER.
6) refreshBtn, YÖNETİCİ GİZLİ ANAHTARIYLA MANUEL REFRESH AKIŞINI BAŞLATMAK İÇİN AYRILMIŞTIR.
7) exportExcelBtn, O ANKİ FİLTRELİ SONUÇLARI EXCEL DOSYASI OLARAK DIŞA AKTARMAK İÇİN KULLANILIR.
8) tableBody İSİMLİ TBODY, TABLO SATIRLARININ JAVASCRIPT TARAFINDAN SONRADAN BASILACAĞI ANA ALANDIR.
9) TABLODA SAĞLAYICI, MODEL, SERVİS, INPUT, OUTPUT, IMAGE, VIDEO, PARA BİRİMİ, NOT VE KAYNAK SÜTUNLARI BULUNUR.
10) logBox ALANI, YÜKLEME VE TAZELEME GİBİ İŞLEMLERİN GÜNLÜK ÇIKTISINI GÖSTERMEK İÇİN AYRILMIŞTIR.
11) BU DOSYA TEK BAŞINA AKILLI DEĞİLDİR; DAVRANIŞI app.js VE GÖRSEL TARAFI styles.css İLE BİRLİKTE TAMAMLANIR.
12) KISACA: BU DOSYA, FİYAT SNAPSHOT'INI GÖRSEL OLARAK SUNAN, FİLTRELEME VE EXCEL AKIŞINI BAŞLATAN ANA HTML İSKELETTİR.
█████████████████████████████████████████████
-->
<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puter Fiyat Takip</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div>
        <h1>Puter Fiyat Takip</h1>
        <p class="muted">Puter model sayfalarından çekilen güncel fiyatlar</p>
      </div>

      <div class="actions">
        <input id="secretInput" type="password" placeholder="Yönetici gizli anahtarı" />
        <button id="refreshBtn">Fiyatları Tazele</button>
        <button id="exportExcelBtn">Excel İndir</button>
      </div>
    </header>

    <section class="meta">
      <div><strong>Son Güncelleme:</strong> <span id="lastUpdated">-</span></div>
      <div><strong>Kayıt:</strong> <span id="rowCount">0</span></div>
    </section>

    <section class="filters">
      <input id="searchInput" type="text" placeholder="Model, sağlayıcı veya servis ara..." />
      <select id="providerFilter">
        <option value="">Tüm Sağlayıcılar</option>
      </select>
      <select id="serviceFilter">
        <option value="">Tüm Servisler</option>
      </select>
      <button id="reloadBtn">Yeniden Yükle</button>
    </section>

    <section class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>Sağlayıcı</th>
            <th>Model</th>
            <th>Servis</th>
            <th>Input</th>
            <th>Output</th>
            <th>Image</th>
            <th>Video</th>
            <th>Para Birimi</th>
            <th>Not</th>
            <th>Kaynak</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>

    <pre id="logBox" class="logBox"></pre>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
